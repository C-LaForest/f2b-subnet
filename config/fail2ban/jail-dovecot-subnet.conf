# Add to /etc/fail2ban/jail.local
# Subnets only — managed by cron batch script, not by log matching

[dovecot-subnet]
enabled = true
filter = dovecot-subnet
logpath = /var/log/fail2ban.log
bantime = -1
maxretry = 1
findtime = 1y
banaction = nftables-multiport[blocktype=reject, addr_options=" flags interval\;"]
port = imaps
